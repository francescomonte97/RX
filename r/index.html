<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIPU</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>

  <div class="app">
    <header class="header">
      <div class="profile">
        <div class="avatar-wrap" id="lipu-settings-trigger" role="button" tabindex="0" aria-label="Apri impostazioni LIPU">
          <img src="./lipu-profile.png" class="avatar" alt="LIPU" />
          <span class="avatar-ring"></span>
        </div>

        <div class="profile-text">
          <div class="name-row">
            <div class="name">Alessandro Lipuma</div>
            <div class="ai-badge">∆</div>
          </div>
          <div class="subtitle"></div>
        </div>
      </div>

      <div class="status">
        <span class="status-dot"></span>
        <span>Online</span>
      </div>
    </header>

    <main id="chat-box" class="chat"></main>

    <div class="composer">
      <button id="image-btn" class="icon-btn image-btn" aria-label="Invia immagine">
        <svg viewBox="0 0 24 24" fill="none" class="icon">
          <path d="M4 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="m8 14 2.5-2.5L14 15l2-2 2 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="9" cy="10" r="1.2" fill="currentColor"/>
        </svg>
      </button>

      <button id="record-btn" class="icon-btn mic-btn" aria-label="Registra audio">
        <svg viewBox="0 0 24 24" fill="none" class="icon">
          <path d="M12 3a3 3 0 0 1 3 3v6a3 3 0 1 1-6 0V6a3 3 0 0 1 3-3Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M12 19v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M8 22h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>

      <div class="composer-center">
        <input
          type="text"
          id="user-input"
          class="text-input"
          placeholder="Scrivi un messaggio..."
          autocomplete="off"
        />

        <div class="recording-ui" id="recording-ui">
          <span id="recording-status">Registrazione...</span>

          <div class="waveform" id="waveform">
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span>
          </div>

          <span id="recording-time">00:00</span>
        </div>
      </div>

      <button id="send-btn" class="icon-btn send-btn" aria-label="Invia">
        <svg viewBox="0 0 24 24" fill="none" class="icon send-icon">
          <path d="M22 2 11 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 2 15 22l-4-9-9-4 20-7Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <input
        id="image-input"
        type="file"
        accept="image/*"
        hidden
      />
    </div>
  </div>

  <!-- MODALE IMPOSTAZIONI -->
  <div id="settings-modal" class="settings-modal hidden" aria-hidden="true">
    <div class="settings-backdrop" id="settings-backdrop"></div>

    <div class="settings-card" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <div class="settings-header">
        <h2 id="settings-title" class="settings-title">Impostazioni</h2>
        <button id="settings-close-btn" class="settings-close-btn" aria-label="Chiudi impostazioni"></button>
      </div>

      <div class="settings-body">
        <div class="settings-section">
          <div class="settings-label">Formato risposta</div>

          <label class="settings-option">
            <input type="radio" name="lipu-reply-mode" value="audio" checked />
            <span>Vocale</span>
          </label>

          <label class="settings-option">
            <input type="radio" name="lipu-reply-mode" value="text" />
            <span>Testo</span>
          </label>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
